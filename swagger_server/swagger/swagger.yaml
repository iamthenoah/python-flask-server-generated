openapi: 3.0.0
info:
  title: Student API
  description: A simple API to manage students and their grades
  version: 1.0.0
servers:
- url: https://virtserver.swaggerhub.com/tutorial/1.0.0
  description: SwaggerHub API Auto Mocking
paths:
  /student:
    get:
      summary: Get all students
      description: Returns a list of all students
      operationId: get_students
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
                x-content-type: application/json
        "404":
          description: No students found
      x-openapi-router-controller: swagger_server.controllers.default_controller
    post:
      summary: Add a new student
      description: Adds a student item to the system
      operationId: add_student
      requestBody:
        description: Student item to add
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Student"
        required: true
      responses:
        "201":
          description: Student created successfully
          content:
            application/json:
              schema:
                type: integer
                description: ID of the created student
                format: int64
                x-content-type: application/json
        "400":
          description: Invalid input
      x-openapi-router-controller: swagger_server.controllers.default_controller
  /student/{student_id}:
    get:
      summary: Get student by ID
      description: Returns a single student
      operationId: get_student_by_id
      parameters:
      - name: student_id
        in: path
        description: ID of student to return
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Invalid ID supplied
        "404":
          description: Student not found
      x-openapi-router-controller: swagger_server.controllers.default_controller
    delete:
      summary: Deletes a student
      description: Delete a single student by ID
      operationId: delete_student
      parameters:
      - name: student_id
        in: path
        description: ID of student to delete
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Student deleted successfully
        "400":
          description: Invalid ID supplied
        "404":
          description: Student not found
      x-openapi-router-controller: swagger_server.controllers.default_controller
  /student/{student_id}/average_grade:
    get:
      summary: Get average grade for a student
      description: Returns the average grade of a student
      operationId: get_student_average_grade
      parameters:
      - name: student_id
        in: path
        description: ID of student
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: number
                format: float
                example: 7.5
        "404":
          description: Student not found or student has no grades
      x-openapi-router-controller: swagger_server.controllers.default_controller
components:
  schemas:
    Student:
      required:
      - first_name
      - last_name
      type: object
      properties:
        student_id:
          type: integer
          format: int64
          readOnly: true
          example: 12345
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        grade_records:
          type: array
          items:
            $ref: "#/components/schemas/GradeRecord"
      example:
        student_id: 12345
        last_name: Doe
        grade_records:
        - grade: 8.5
          subject_name: Mathematics
        - grade: 8.5
          subject_name: Mathematics
        first_name: John
    GradeRecord:
      required:
      - grade
      - subject_name
      type: object
      properties:
        subject_name:
          type: string
          example: Mathematics
        grade:
          maximum: 10
          minimum: 0
          type: number
          format: float
          example: 8.5
      example:
        grade: 8.5
        subject_name: Mathematics

